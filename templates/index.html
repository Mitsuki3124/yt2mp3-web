<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT2MP3 Web v3.0</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>🎵 YT2MP3 Pro Web</h1>
        <p>Descarga audio y video desde YouTube, Spotify y YouTube Music</p>
    </header>

    <main>
        <!-- Formulario principal -->
        <section id="input-section">
            <div class="card">
                <label for="url-input">🔗 Ingresa la URL:</label>
                <div class="input-group">
                    <input type="url" id="url-input" placeholder="https://www.youtube.com/watch?v=...">
                    <button id="fetch-info-btn">🔍 Obtener información</button>
                </div>
                <div id="loading-info" class="hidden">⏳ Cargando información...</div>
            </div>
        </section>

        <!-- Tarjeta de información (se muestra después de obtener info) -->
        <section id="info-section" class="hidden">
            <div class="card info-card" id="info-card">
                <div id="info-content">
                    <!-- Rellenado por JavaScript -->
                </div>
            </div>
        </section>

        <!-- Opciones de descarga -->
        <section id="options-section" class="hidden">
            <div class="card">
                <h3>⚙️ Opciones de descarga</h3>
                <div id="options-content">
                    <!-- Selectores dinámicos -->
                </div>
                <button id="download-btn" class="btn-primary">⬇️ Descargar</button>
                <div id="download-status"></div>
            </div>
        </section>

        <!-- Historial -->
        <section id="history-section">
            <div class="card">
                <h3>📋 Historial de descargas</h3>
                <div id="history-content">
                    <p>Cargando...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>YT2MP3 Pro Web v3.0 — Solo para uso personal y educativo</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
